<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Bridge Trivia: A Star Trek Party Game</title>
<style>
/* ============================================================================
   BRIDGE TRIVIA — GLOBAL DESIGN TOKENS
   Base look: a command-console panel floating on a starfield. Each era gets its
   own accent palette (set via [data-era] attribute) layered on top of these
   shared tokens, so era decks feel distinct without re-inventing layout.
   ============================================================================ */
:root{
  --bg-deep:#05060d;
  --bg-panel:#0d1220;
  --bg-panel-2:#131a2e;
  --line:#26314d;
  --text:#e9edf7;
  --text-dim:#9aa6c4;
  --accent:#5fd0ff;
  --accent-2:#7c5cff;
  --good:#3ddc97;
  --bad:#ff5d7a;
  --warn:#ffcc66;
  --radius:14px;
  --radius-sm:8px;
  --shadow-glow:0 0 0 1px rgba(95,208,255,.15), 0 8px 30px rgba(0,0,0,.55);
  --font-display:'Orbitron', 'Segoe UI', sans-serif;
  --font-body:'Exo 2','Segoe UI',sans-serif;
  --font-mono:'Share Tech Mono','Consolas',monospace;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--bg-deep);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}
@font-face{ /* system fallback stack only; no external font fetch required */ }
h1,h2,h3,h4{font-family:var(--font-display);letter-spacing:.03em;margin:0 0 .4em;}
p{margin:0 0 .6em;line-height:1.5;}
button{font-family:var(--font-body);cursor:pointer;}
::selection{background:var(--accent);color:#001018;}
:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}

/* Starfield background layer */
#starfield{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(124,92,255,.10), transparent 55%),
    radial-gradient(ellipse at 80% 70%, rgba(95,208,255,.10), transparent 55%),
    var(--bg-deep);
}
#starfield canvas{position:absolute;inset:0;width:100%;height:100%;}

#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

/* ---------- Layout shell ---------- */
.wrap{max-width:1200px;margin:0 auto;padding:20px;width:100%;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 20px;background:rgba(13,18,32,.85);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand .badge{
  width:38px;height:38px;border-radius:50%;
  background:conic-gradient(from 90deg, var(--accent), var(--accent-2), var(--accent));
  display:flex;align-items:center;justify-content:center;font-family:var(--font-display);
  font-weight:900;color:#04101c;font-size:14px;box-shadow:0 0 18px rgba(95,208,255,.55);
}
.brand h1{font-size:1.05rem;margin:0;}
.brand .sub{font-size:.72rem;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;}
.topbar-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.roomcode-pill{
  font-family:var(--font-mono);background:var(--bg-panel-2);border:1px solid var(--line);
  padding:6px 12px;border-radius:20px;font-size:.95rem;letter-spacing:.15em;color:var(--accent);
}

/* ---------- Buttons ---------- */
.btn{
  border:1px solid var(--line);background:var(--bg-panel-2);color:var(--text);
  padding:12px 18px;border-radius:var(--radius-sm);font-size:.95rem;font-weight:600;
  transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
  min-height:44px;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.35);}
.btn:active{transform:translateY(0);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#04101c;border:none;}
.btn-good{background:linear-gradient(135deg,#2fbf82,#3ddc97);color:#00230f;border:none;}
.btn-bad{background:linear-gradient(135deg,#e14a68,#ff5d7a);color:#2a0008;border:none;}
.btn-ghost{background:transparent;}
.btn-sm{padding:8px 12px;font-size:.82rem;min-height:36px;}
.btn-block{width:100%;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-icon{width:44px;height:44px;padding:0;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:1.1rem;}

/* ---------- Panels / cards (UI containers, not trivia cards) ---------- */
.panel{
  background:linear-gradient(180deg, var(--bg-panel), var(--bg-panel-2));
  border:1px solid var(--line);border-radius:var(--radius);padding:18px;
  box-shadow:var(--shadow-glow);
}
.panel + .panel{margin-top:18px;}
.panel h2{font-size:1rem;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;}
.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:repeat(3,1fr);}
@media(max-width:820px){.grid-2,.grid-3{grid-template-columns:1fr;}}

label{display:block;font-size:.8rem;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;}
input[type=text]{
  width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--line);
  background:#080b16;color:var(--text);font-size:1rem;font-family:var(--font-mono);letter-spacing:.05em;
}
input[type=text]:focus{border-color:var(--accent);}
.field{margin-bottom:14px;}
.hint{font-size:.78rem;color:var(--text-dim);}
.error-msg{color:var(--bad);font-size:.85rem;margin-top:6px;min-height:1.1em;}

/* ---------- Landing screen ---------- */
.hero{text-align:center;padding:40px 20px 10px;}
.hero h1{font-size:clamp(1.8rem,5vw,3rem);
  background:linear-gradient(135deg,#fff,var(--accent) 60%,var(--accent-2));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hero p{color:var(--text-dim);max-width:560px;margin:0 auto 20px;}
.landing-actions{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:26px 0;}
.landing-actions .btn{min-width:220px;font-size:1.05rem;padding:16px 22px;}
.era-strip{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:30px 0;}
.era-chip{
  padding:8px 14px;border-radius:20px;font-size:.78rem;font-weight:700;letter-spacing:.04em;
  border:1px solid var(--line);
}
details.info{max-width:760px;margin:18px auto;background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius);padding:4px 16px;}
details.info summary{cursor:pointer;padding:12px 0;font-family:var(--font-display);color:var(--accent);font-size:.95rem;}
details.info .body{padding-bottom:16px;color:var(--text-dim);font-size:.9rem;}
details.info code{background:#000;color:var(--accent);padding:2px 6px;border-radius:4px;font-family:var(--font-mono);}
details.info ol,details.info ul{padding-left:1.2em;}

/* ---------- Scoreboard ---------- */
.scoreboard{display:flex;flex-wrap:wrap;gap:10px;}
.score-card{
  flex:1 1 140px;background:var(--bg-panel-2);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:10px 12px;position:relative;
}
.score-card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent), 0 0 18px rgba(95,208,255,.35);}
.score-card .name{font-weight:700;font-size:.92rem;display:flex;align-items:center;gap:6px;}
.score-card .turn-tag{font-size:.62rem;background:var(--accent);color:#001018;padding:2px 6px;border-radius:10px;text-transform:uppercase;}
.score-card .pts{font-family:var(--font-mono);font-size:1.4rem;color:var(--accent);margin-top:4px;}
.score-card .adjust{display:flex;gap:6px;margin-top:8px;}
.score-card .adjust button{flex:1;padding:4px;font-size:.85rem;}
.score-card .remove{position:absolute;top:6px;right:6px;background:none;border:none;color:var(--text-dim);font-size:.9rem;}

/* ---------- Dice ---------- */
.dice-zone{display:flex;flex-direction:column;align-items:center;gap:14px;padding:10px 0;}
.die{
  width:110px;height:110px;border-radius:20px;position:relative;
  background:radial-gradient(circle at 30% 30%, #1c2440, #05070f);
  border:2px solid var(--line);display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:1rem;text-align:center;color:var(--text);
  box-shadow:0 10px 30px rgba(0,0,0,.5), inset 0 0 20px rgba(95,208,255,.08);
  transition:transform .15s ease;
}
.die.rolling{animation:diceRoll .55s linear infinite;}
@keyframes diceRoll{
  0%{transform:rotate(0deg) scale(1);}
  50%{transform:rotate(180deg) scale(1.08);}
  100%{transform:rotate(360deg) scale(1);}
}
.die .die-label{font-size:.62rem;letter-spacing:.08em;color:var(--text-dim);position:absolute;bottom:10px;}
.die .die-face{font-size:1.6rem;font-weight:900;}
.die.result-wildcard{border-color:#ffd15c;box-shadow:0 0 30px rgba(255,209,92,.55);}

/* ---------- Era grid (deck selector) ---------- */
.era-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
.era-tile{
  border-radius:var(--radius);padding:14px;border:2px solid transparent;position:relative;overflow:hidden;
  cursor:pointer;min-height:110px;display:flex;flex-direction:column;justify-content:space-between;
  transition:transform .15s ease, box-shadow .15s ease;color:#fff;
}
.era-tile:hover{transform:translateY(-3px);}
.era-tile.disabled{opacity:.35;cursor:not-allowed;transform:none;filter:grayscale(.4);}
.era-tile.selected{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.25);}
.era-tile.highlight{animation:pulseGlow 1.1s ease-in-out infinite;}
@keyframes pulseGlow{
  0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.55);}
  50%{box-shadow:0 0 0 8px rgba(255,255,255,0);}
}
.era-tile .era-icon{font-family:var(--font-display);font-weight:900;font-size:1.3rem;letter-spacing:.05em;}
.era-tile .era-name{font-size:.85rem;font-weight:700;}
.era-tile .era-tagline{font-size:.68rem;opacity:.85;}
.era-tile .era-progress{font-size:.68rem;font-family:var(--font-mono);opacity:.9;}

/* Era palettes — applied via data-era attribute on .era-tile / .card-face / panels */
[data-era="tos"]{background:linear-gradient(150deg,#8B1E1E 0%,#1B3A6B 55%,#0a1128 100%);}
[data-era="tos"] .era-icon{color:#D4AF37;}
[data-era="tng"]{background:linear-gradient(150deg,#3a0d1f 0%,#7B1E3A 40%,#CC6600 100%);}
[data-era="tng"] .era-icon{color:#ffb673;}
[data-era="ent"]{background:linear-gradient(150deg,#0e1830 0%,#1b2a4a 50%,#42586e 100%);}
[data-era="ent"] .era-icon{color:#cfe0ee;}
[data-era="kelvin"]{background:linear-gradient(150deg,#02040a 0%,#0a3a52 55%,#00d4ff 130%);}
[data-era="kelvin"] .era-icon{color:#eafcff;}
[data-era="modern"]{background:linear-gradient(150deg,#150a2e 0%,#3b1e6d 45%,#7c3aed 100%);}
[data-era="modern"] .era-icon{color:#9ff0ff;}
[data-era="wildcard"]{background:conic-gradient(from 120deg,#ff6ec7,#7c5cff,#5fd0ff,#ffd15c,#ff6ec7);}
[data-era="wildcard"] .era-icon{color:#0a0a12;}
[data-era="wildcard"] .era-name, [data-era="wildcard"] .era-tagline, [data-era="wildcard"] .era-progress{color:#0a0a12;}

/* ---------- Card grid (per-era deck of trivia cards) ---------- */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;margin-top:10px;}
.mini-card{
  aspect-ratio:3/4;border-radius:10px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:900;color:#fff;position:relative;transition:transform .12s ease;
}
.mini-card:not(.used):hover{transform:scale(1.05);}
.mini-card.used{opacity:.25;filter:grayscale(1);cursor:not-allowed;}
.mini-card .num{font-size:1.1rem;}

/* ---------- Trivia card face (question display) ---------- */
.card-face{
  border-radius:18px;padding:26px;position:relative;overflow:hidden;color:#fff;
  min-height:220px;display:flex;flex-direction:column;gap:14px;justify-content:center;
  border:1px solid rgba(255,255,255,.25);
}
.card-face .era-tag{position:absolute;top:14px;left:16px;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;opacity:.85;}
.card-face .diff-tag{
  position:absolute;top:14px;right:16px;font-family:var(--font-mono);font-size:.75rem;
  background:rgba(0,0,0,.35);padding:4px 10px;border-radius:12px;
}
.card-face .q-text{font-size:clamp(1.05rem,2.4vw,1.5rem);font-weight:700;line-height:1.4;margin-top:14px;}
.card-face .a-text{
  font-size:1.05rem;font-family:var(--font-mono);background:rgba(0,0,0,.35);padding:12px 14px;border-radius:10px;
  border-left:4px solid var(--good);
}
.diff-select{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}
.diff-btn{
  flex:1 1 130px;padding:14px 10px;border-radius:12px;border:1px solid var(--line);background:var(--bg-panel-2);
  color:var(--text);text-align:center;font-family:var(--font-display);
}
.diff-btn .lvl{font-size:.9rem;}
.diff-btn .pts{font-size:1.3rem;color:var(--accent);}
.diff-btn.used{opacity:.3;filter:grayscale(1);cursor:not-allowed;}
.diff-btn:not(.used):hover{border-color:var(--accent);}

/* ---------- Misc UI ---------- */
.turn-banner{
  text-align:center;padding:12px;border-radius:var(--radius-sm);background:linear-gradient(90deg,var(--accent-2),var(--accent));
  color:#04101c;font-weight:800;letter-spacing:.03em;font-family:var(--font-display);font-size:.95rem;
}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.pill{background:var(--bg-panel-2);border:1px solid var(--line);border-radius:14px;padding:4px 10px;font-size:.75rem;color:var(--text-dim);}
.flex-between{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--bg-panel-2);border:1px solid var(--accent);color:var(--text);
  padding:12px 20px;border-radius:var(--radius-sm);z-index:100;box-shadow:var(--shadow-glow);
  font-size:.9rem;max-width:90vw;text-align:center;
}
.list-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;border:1px solid var(--line);border-radius:var(--radius-sm);margin-bottom:8px;background:var(--bg-panel-2);}
.list-row input[type=text]{padding:8px 10px;font-size:.9rem;}
.tag-mode{font-size:.7rem;padding:2px 8px;border-radius:10px;background:var(--accent-2);color:#fff;text-transform:uppercase;}
.footer-note{text-align:center;color:var(--text-dim);font-size:.75rem;padding:20px;}
.hidden{display:none !important;}
.sync-status{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--text-dim);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--good);}
.sync-dot.local{background:var(--warn);}

@media(max-width:600px){
  .wrap{padding:12px;}
  .card-face{padding:18px;}
  .die{width:88px;height:88px;}
}
</style>
</head>
<body>

<div id="starfield"><canvas id="starfield-canvas"></canvas></div>

<div id="app">
  <!-- ============================ TOP BAR ============================ -->
  <div class="topbar" id="topbar">
    <div class="brand">
      <div class="badge">BT</div>
      <div>
        <h1>Bridge Trivia</h1>
        <div class="sub">A Star Trek Party Game</div>
      </div>
    </div>
    <div class="topbar-right" id="topbarRight"><!-- populated by JS: room code, role, sync status --></div>
  </div>

  <div class="wrap" id="main"><!-- all screens render here via JS --></div>

  <div class="footer-note">Fan-made trivia for private/personal use. Not affiliated with or endorsed by CBS/Paramount. All questions are original write-ups about published, publicly known Star Trek premises — no scripts or copyrighted text are reproduced.</div>
</div>

<div id="toastHost"></div>

<!-- ======================================================================
     OPTIONAL: Firebase SDK (compat build) for true cross-device sync.
     This only activates if you fill in FIREBASE_CONFIG below with real
     values. Loaded from Google's CDN — see setup instructions in the
     comment block near FIREBASE_CONFIG in the script section.
====================================================================== -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
/* ============================================================================
   BRIDGE TRIVIA — GAME SCRIPT
   Sections:
     1. CONFIG & SYNC LAYER (Firebase or LocalSync fallback)
     2. TRIVIA DATA (5 eras x 20 cards x 4 questions)
     3. GAME STATE HELPERS
     4. RENDERING — Landing / Host / Player screens
     5. EVENT HANDLERS / GAME LOGIC
     6. BOOTSTRAP
   ============================================================================ */

/* ----------------------------------------------------------------------
   1. CONFIG & SYNC LAYER
   ------------------------------------------------------------------------
   HOW TO ENABLE TRUE REMOTE PLAY (recommended — takes about 5 minutes):
     1. Go to https://console.firebase.google.com and create a free project.
     2. In the project, open "Build > Realtime Database" and click
        "Create Database". Start in TEST MODE for a quick game night
        (anyone with the link can read/write — fine for a casual party
        game with random room codes; do not use for sensitive data).
     3. Go to Project Settings > General > "Your apps" > Web app (</>),
        register an app, and copy the firebaseConfig object it gives you.
     4. Paste those values into FIREBASE_CONFIG below, replacing the
        placeholder strings.
     5. Re-open this HTML file (or re-upload it to your host). The game
        will automatically detect the config and use Firebase for
        real-time cross-device sync — host on a laptop, players join from
        their phones anywhere with internet access.

   IF YOU SKIP THIS STEP:
     The game still works! It automatically falls back to "LocalSync"
     mode, which uses the browser's localStorage + BroadcastChannel API.
     This keeps multiple BROWSER TABS/WINDOWS ON THE SAME DEVICE in sync
     instantly — great for pass-and-play on one computer/tablet, or for
     a single host device where players take turns on the same screen.
     LocalSync CANNOT sync across different physical devices — for that
     you need Firebase (or another backend) configured above.
   ---------------------------------------------------------------------- */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCD_nb1KB57Tl5wgfmSMShQNq91F1YPcBY",
  authDomain: "trekia-a4b59.firebaseapp.com",
  databaseURL: "https://trekia-a4b59-default-rtdb.firebaseio.com",
  projectId: "trekia-a4b59",
  storageBucket: "trekia-a4b59.firebasestorage.app",
  messagingSenderId: "832581251669",
  appId: "1:832581251669:web:459d2c1011ac9ca32e9adc"
};

const FIREBASE_ENABLED = FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey.indexOf("YOUR_") !== 0;

/**
 * Sync abstraction. Both backends expose the same three methods so the
 * rest of the game never needs to know which transport is active:
 *   Sync.createRoom(code, initialState)
 *   Sync.update(code, partialState)   -- shallow-merges into root object
 *   Sync.subscribe(code, callback)    -- callback(fullState) on every change
 *   Sync.roomExists(code, cb)         -- cb(bool)
 */
const Sync = (function(){
  let mode = 'local';
  let fbApp = null, fbDb = null;
  let localChannels = {}; // roomCode -> BroadcastChannel

  if (FIREBASE_ENABLED) {
    try {
      fbApp = firebase.initializeApp(FIREBASE_CONFIG);
      fbDb = firebase.database();
      mode = 'firebase';
    } catch (e) {
      console.warn('Firebase init failed, falling back to LocalSync:', e);
      mode = 'local';
    }
  }

  function localKey(code){ return 'bridgetrivia_room_' + code; }

  function getLocalState(code){
    try {
      const raw = localStorage.getItem(localKey(code));
      return raw ? JSON.parse(raw) : null;
    } catch(e){ return null; }
  }

  function setLocalState(code, state){
    localStorage.setItem(localKey(code), JSON.stringify(state));
    if (!localChannels[code]) {
      try { localChannels[code] = new BroadcastChannel('bridgetrivia_' + code); } catch(e){ localChannels[code] = null; }
    }
    if (localChannels[code]) localChannels[code].postMessage({type:'update', state});
  }

  return {
    mode: () => mode,

    createRoom(code, initialState, cb){
      if (mode === 'firebase') {
        fbDb.ref('rooms/' + code).set(initialState).then(()=>cb && cb(true)).catch(()=>cb && cb(false));
      } else {
        setLocalState(code, initialState);
        cb && cb(true);
      }
    },

    roomExists(code, cb){
      if (mode === 'firebase') {
        fbDb.ref('rooms/' + code).once('value').then(snap => cb(snap.exists())).catch(()=>cb(false));
      } else {
        cb(!!getLocalState(code));
      }
    },

    update(code, partial){
      if (mode === 'firebase') {
        fbDb.ref('rooms/' + code).update(partial);
      } else {
        const current = getLocalState(code) || {};
        const merged = Object.assign({}, current, partial);
        setLocalState(code, merged);
      }
    },

    // Deep-set a nested value using a slash path, e.g. "players/p1/score"
    updatePath(code, path, value){
      if (mode === 'firebase') {
        fbDb.ref('rooms/' + code + '/' + path).set(value);
      } else {
        const current = getLocalState(code) || {};
        const parts = path.split('/');
        let obj = current;
        for (let i=0;i<parts.length-1;i++){
          if (!obj[parts[i]]) obj[parts[i]] = {};
          obj = obj[parts[i]];
        }
        obj[parts[parts.length-1]] = value;
        setLocalState(code, current);
      }
    },

    subscribe(code, callback){
      if (mode === 'firebase') {
        const ref = fbDb.ref('rooms/' + code);
        ref.on('value', snap => callback(snap.val()));
        return () => ref.off();
      } else {
        if (!localChannels[code]) {
          try { localChannels[code] = new BroadcastChannel('bridgetrivia_' + code); } catch(e){ localChannels[code] = null; }
        }
        const handler = (e) => { if (e.data && e.data.type === 'update') callback(e.data.state); };
        if (localChannels[code]) localChannels[code].addEventListener('message', handler);
        // Fire immediately with current state
        const existing = getLocalState(code);
        if (existing) setTimeout(()=>callback(existing), 0);
        // Cross-tab fallback via storage event (covers some browsers where BroadcastChannel timing is delayed)
        const storageHandler = (e) => {
          if (e.key === localKey(code) && e.newValue) callback(JSON.parse(e.newValue));
        };
        window.addEventListener('storage', storageHandler);
        return () => {
          if (localChannels[code]) localChannels[code].removeEventListener('message', handler);
          window.removeEventListener('storage', storageHandler);
        };
      }
    }
  };
})();

const ERA_ORDER = ['tos','tng','ent','kelvin','modern'];

/* ----------------------------------------------------------------------
   3. GAME STATE HELPERS
   ---------------------------------------------------------------------- */
let ROOM_CODE = null;
let IS_HOST = false;
let MY_PLAYER_ID = null;
let ROOM_STATE = null;
let unsubscribe = null;

function genRoomCode(){
  const letters = 'ACDEFGHJKLMNPQRSTUVWXYZ'; // no B/I/O to avoid confusion
  let code = '';
  for (let i=0;i<4;i++) code += letters[Math.floor(Math.random()*letters.length)];
  return code;
}
function genId(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }

function defaultRoomState(mode){
  return {
    code: ROOM_CODE,
    mode: mode,              // 'individual' | 'team'
    status: 'lobby',         // 'lobby' | 'playing' | 'ended'
    players: {},             // id -> {id,name,score}
    turnOrder: [],
    turnIndex: 0,
    dice: { rolling:false, result:null },
    activeEra: null,
    activeCard: null,        // {eraId, cardId}
    activeQuestion: null,    // {difficulty, revealed:false, answered:false, points}
    usedCards: {},           // eraId -> [cardId,...]
    usedDifficulties: {},    // cardId -> [difficulty,...]
    updatedAt: Date.now()
  };
}

function pushUpdate(partial){
  partial.updatedAt = Date.now();
  Sync.update(ROOM_CODE, partial);
}

function showToast(msg, ms){
  const host = document.getElementById('toastHost');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(()=> el.remove(), ms || 2600);
}

function attemptJoin(){
  const codeInput = document.getElementById('joinCode');
  const nameInput = document.getElementById('joinName');
  const errEl = document.getElementById('joinErr');
  const code = codeInput.value.trim().toUpperCase();
  const name = nameInput.value.trim();
  errEl.textContent = '';

  if (code.length !== 4){ errEl.textContent = 'Room codes are 4 letters long.'; return; }
  if (!name){ errEl.textContent = 'Please enter a name.'; return; }

  Sync.roomExists(code, (exists)=>{
    if (!exists){ errEl.textContent = 'No room found with that code. Double-check it with your host.'; return; }
    // Fetch current state once to validate duplicate names & get status
    Sync.subscribe(code, function onceCb(state){
      if (!state) return;
      const dupe = Object.values(state.players || {}).some(p => p.name.toLowerCase() === name.toLowerCase());
      if (dupe){ errEl.textContent = 'That name is already taken in this room — try another.'; return; }
      const id = genId('p');
      MY_PLAYER_ID = id;
      ROOM_CODE = code;
      IS_HOST = false;
      const playersUpdate = {}; playersUpdate[id] = { id, name, score:0 };
      Sync.updatePath(code, 'players/' + id, { id, name, score:0 });
      // switch to real ongoing subscription
      subscribeToRoom();
      renderTopbar();
      showToast('Joined room ' + code + '!');
    })();
  });
}

/* ---------- SUBSCRIBE & MAIN RENDER DISPATCH ---------- */
function subscribeToRoom(){
  if (unsubscribe) unsubscribe();
  unsubscribe = Sync.subscribe(ROOM_CODE, (state)=>{
    if (!state){ return; }
    ROOM_STATE = state;
    renderTopbar();
    if (IS_HOST) renderHostDashboard();
    else renderPlayerScreen();
  });
}

    listEl.innerHTML = players.map(p => `
      <div class="list-row">

      </div>
    `).join('');
    listEl.querySelectorAll('.renameInput').forEach(inp=>{
      inp.addEventListener('change', ()=>{
        const id = inp.dataset.id;

      });
    });
    listEl.querySelectorAll('.removePlayerBtn').forEach(btn=>{
      btn.onclick = ()=>{

        const updated = Object.assign({}, s.players);
        delete updated[id];
        pushUpdate({ players: updated });

  document.getElementById('manualAddBtn').onclick = ()=>{
    const input = document.getElementById('manualName');

  };

    if (ids.length < 1) return;
    // Shuffle turn order for fairness
    for (let i=ids.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [ids[i],ids[j]]=[ids[j],ids[i]]; }
    pushUpdate({ status:'playing', turnOrder: ids, turnIndex: 0 });
  };
}

function escapeHtml(str){
  const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
}

function currentPlayer(s){
  if (!s.turnOrder || s.turnOrder.length===0) return null;
  const id = s.turnOrder[s.turnIndex % s.turnOrder.length];
  return s.players ? s.players[id] : null;
}

function renderScoreboard(s, opts){
  opts = opts || {};
  const players = (s.turnOrder && s.turnOrder.length ? s.turnOrder : Object.keys(s.players||{})).map(id=>s.players[id]).filter(Boolean);
  const activeId = s.turnOrder && s.turnOrder.length ? s.turnOrder[s.turnIndex % s.turnOrder.length] : null;
  return `<div class="scoreboard">${players.map(p=>`
    <div class="score-card ${p.id===activeId?'active':''}">
      ${p.id===activeId?'<span class="turn-tag">On the bridge</span>':''}
      ${opts.allowRemove?`<button class="remove removeScoreBtn" data-id="${p.id}" title="Remove">✕</button>`:''}
      <div class="name">${escapeHtml(p.name)}</div>
      <div class="pts">${p.score||0}</div>
      ${opts.editable?`
        <div class="adjust">
          <button class="btn btn-sm adjBtn" data-id="${p.id}" data-delta="-10">−10</button>
          <button class="btn btn-sm adjBtn" data-id="${p.id}" data-delta="10">+10</button>
        </div>`:''}
    </div>
  `).join('')}</div>`;
}

function wireScoreboardEvents(s){
  mainEl.querySelectorAll('.adjBtn').forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.dataset.id;
      const delta = parseInt(btn.dataset.delta,10);
      const newScore = (s.players[id].score||0) + delta;
      Sync.updatePath(ROOM_CODE, 'players/'+id+'/score', newScore);
    };
  });
  mainEl.querySelectorAll('.removeScoreBtn').forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.dataset.id;
      const updated = Object.assign({}, s.players); delete updated[id];
      const newOrder = (s.turnOrder||[]).filter(x=>x!==id);
      pushUpdate({ players: updated, turnOrder: newOrder, turnIndex: Math.min(s.turnIndex, Math.max(newOrder.length-1,0)) });
    };
  });
}

function eraProgressText(eraId, s){
  const total = ERAS[eraId].cards.length;
  const used = (s.usedCards && s.usedCards[eraId]) ? s.usedCards[eraId].length : 0;
  return `${total-used}/${total} left`;
}

function renderEraGrid(s, opts){
  opts = opts || {};
  const tiles = ERA_ORDER.map(eraId=>{
    const era = ERAS[eraId];
    const total = era.cards.length;
    const used = (s.usedCards && s.usedCards[eraId]) ? s.usedCards[eraId].length : 0;
    const exhausted = used >= total;
    const isSelectable = opts.selectable && !exhausted && (opts.forcedEra ? opts.forcedEra===eraId : true);
    const isHighlighted = s.dice && s.dice.result === eraId;
    return `<div class="era-tile ${exhausted?'disabled':''} ${isHighlighted?'highlight':''} ${(opts.selectedEra===eraId)?'selected':''}"
                 data-era="${eraId}" data-era-select="${eraId}" ${isSelectable?'':'aria-disabled="true"'}>
      <div class="era-icon">${era.icon}</div>
      <div>
        <div class="era-name">${era.name}</div>
        <div class="era-tagline">${era.tagline}</div>
      </div>
      <div class="era-progress">${eraProgressText(eraId,s)}</div>
    </div>`;
  }).join('');
  const wildHighlighted = s.dice && s.dice.result === 'wildcard';
  const wildTile = `<div class="era-tile ${wildHighlighted?'highlight':''}" data-era="wildcard">
      <div class="era-icon">★</div>
      <div>
        <div class="era-name">Wildcard</div>
        <div class="era-tagline">Choose any era</div>
      </div>
      <div class="era-progress">&nbsp;</div>
    </div>`;
  return `<div class="era-grid">${tiles}${wildTile}</div>`;
}

function renderCardGrid(eraId, s){
  const era = ERAS[eraId];
  const used = (s.usedCards && s.usedCards[eraId]) ? s.usedCards[eraId] : [];
  return `<div class="card-grid" data-era-cards="${eraId}">
    ${era.cards.map((c,idx)=>{
      const isUsed = used.includes(c.id);
      return `<div class="mini-card ${isUsed?'used':''}" data-era="${eraId}" data-card-select="${c.id}" title="${escapeHtml(c.title)}">
        <span class="num">${idx+1}</span>
      </div>`;
    }).join('')}
  </div>`;
}

  const active = currentPlayer(s);

function diceFaceLabel(dice){
  if (!dice || !dice.result) return '?';
  if (dice.result === 'wildcard') return '★';
  return ERAS[dice.result].icon;
}

function hostRollDice(){
  pushUpdate({ dice: { rolling:true, result:null } });
  setTimeout(()=>{
    const options = ERA_ORDER.concat(['wildcard']);
    const result = options[Math.floor(Math.random()*options.length)];
    const patch = { dice: { rolling:false, result } };
    if (result !== 'wildcard') patch.activeEra = result;
    else patch.activeEra = null;
    patch.activeCard = null;
    patch.activeQuestion = null;
    pushUpdate(patch);
  }, 900);
}

function renderCardArea(s){
  const area = document.getElementById('cardArea');
  if (!area) return;

  if (s.activeQuestion){
    area.innerHTML = renderQuestionPanel(s, true);
    wireQuestionPanel(s, true);
    return;
  }
  if (s.activeCard){
    const era = ERAS[s.activeCard.eraId];
    const card = era.cards.find(c=>c.id===s.activeCard.cardId);
    const usedDiffs = (s.usedDifficulties && s.usedDifficulties[card.id]) || [];
    area.innerHTML = `
      <div class="panel" data-era="${era.id}">
        <h2 style="color:#fff;">${escapeHtml(card.title)}</h2>
        <p class="hint" style="color:rgba(255,255,255,.75);">Choose a difficulty to reveal that question to everyone.</p>
        <div class="diff-select">
          ${DIFFICULTIES.map(d=>`
            <div class="diff-btn ${usedDiffs.includes(d.key)?'used':''}" data-diff="${d.key}">
              <div class="lvl">${d.label}</div>
              <div class="pts">${d.points} pts</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    area.querySelectorAll('.diff-btn').forEach(btn=>{
      if (btn.classList.contains('used')) return;
      btn.onclick = ()=>{
        const diff = btn.dataset.diff;
        const points = DIFFICULTIES.find(d=>d.key===diff).points;
        pushUpdate({ activeQuestion: { difficulty:diff, revealed:false, answered:false, points } });
      };
    });
    return;
  }
  if (s.activeEra){
    area.innerHTML = `<div class="panel"><h2>${ERAS[s.activeEra].name} — Choose a Card</h2>${renderCardGrid(s.activeEra, s)}</div>`;
    area.querySelectorAll('[data-card-select]').forEach(tile=>{
      if (tile.classList.contains('used')) return;
      tile.onclick = ()=>{
        pushUpdate({ activeCard: { eraId: tile.dataset.era, cardId: tile.dataset.cardSelect } });
      };
    });
    return;
  }
  area.innerHTML = `<p class="hint">Roll the dice to reveal an era deck, then choose a card.</p>`;
}

function renderQuestionPanel(s, isHost){
  const era = ERAS[s.activeCard.eraId];
  const card = era.cards.find(c=>c.id===s.activeCard.cardId);
  const q = card.questions[s.activeQuestion.difficulty];
  const diffMeta = DIFFICULTIES.find(d=>d.key===s.activeQuestion.difficulty);
  return `
    <div class="card-face" data-era="${era.id}">
      <span class="era-tag">${era.name}</span>
      <span class="diff-tag">${diffMeta.label} · ${diffMeta.points} pts</span>
      <div class="q-text">${escapeHtml(q.q)}</div>
      ${ (isHost || s.activeQuestion.revealed) ? `<div class="a-text"><strong>Answer:</strong> ${escapeHtml(q.a)}</div>` : '' }
      ${ isHost ? `
        <div class="pill-row" style="margin-top:6px;">
          ${!s.activeQuestion.revealed ? `<button class="btn btn-primary" id="revealBtn">Reveal Answer</button>` : ''}
          <button class="btn btn-good" id="correctBtn" ${s.activeQuestion.answered?'disabled':''}>✔ Correct</button>
          <button class="btn btn-bad" id="incorrectBtn" ${s.activeQuestion.answered?'disabled':''}>✘ Incorrect</button>
          <button class="btn btn-ghost" id="cancelQBtn">Cancel / Choose Different Card</button>
        </div>
      ` : '' }
    </div>
  `;
}

function wireQuestionPanel(s){
  const revealBtn = document.getElementById('revealBtn');
  if (revealBtn) revealBtn.onclick = ()=>{
    pushUpdate({ activeQuestion: Object.assign({}, s.activeQuestion, { revealed:true }) });
  };
  const correctBtn = document.getElementById('correctBtn');
  if (correctBtn) correctBtn.onclick = ()=> resolveAnswer(s, true);
  const incorrectBtn = document.getElementById('incorrectBtn');
  if (incorrectBtn) incorrectBtn.onclick = ()=> resolveAnswer(s, false);
  const cancelBtn = document.getElementById('cancelQBtn');
  if (cancelBtn) cancelBtn.onclick = ()=>{
    pushUpdate({ activeCard:null, activeQuestion:null });
  };
}

function resolveAnswer(s, correct){
  const active = currentPlayer(s);
  const card = s.activeCard;
  const q = s.activeQuestion;
  // Mark card+difficulty used
  const usedCards = Object.assign({}, s.usedCards);
  const usedDifficulties = Object.assign({}, s.usedDifficulties);
  const eraUsed = (usedCards[card.eraId] || []).slice();
  const cardDiffs = (usedDifficulties[card.cardId] || []).slice();
  if (!cardDiffs.includes(q.difficulty)) cardDiffs.push(q.difficulty);
  usedDifficulties[card.cardId] = cardDiffs;
  // A card is "fully used" (grey out) once all 4 difficulties are answered
  const allDiffsUsed = DIFFICULTIES.every(d=>cardDiffs.includes(d.key));
  if (allDiffsUsed && !eraUsed.includes(card.cardId)) eraUsed.push(card.cardId);
  usedCards[card.eraId] = eraUsed;

  const patch = {
    activeQuestion: Object.assign({}, q, { answered:true, revealed:true }),
    usedCards, usedDifficulties
  };
  if (correct && active){
    Sync.updatePath(ROOM_CODE, 'players/'+active.id+'/score', (active.score||0) + q.points);
  }
  pushUpdate(patch);
  showToast(correct ? `+${q.points} pts to ${active?active.name:'—'}!` : 'Marked incorrect — no points awarded.');
}

function advanceTurn(){
  const s = ROOM_STATE;
  if (!s.turnOrder || s.turnOrder.length===0) return;
  const nextIndex = (s.turnIndex + 1) % s.turnOrder.length;
  pushUpdate({
    turnIndex: nextIndex,
    dice: { rolling:false, result:null },
    activeEra:null, activeCard:null, activeQuestion:null
  });
}

function renderGameEnded(s){
  const players = Object.values(s.players||{}).sort((a,b)=>(b.score||0)-(a.score||0));
  mainEl.innerHTML = `
    <div class="wrap" style="max-width:600px;">
      <div class="panel">
        <h2>Mission Complete 🖖</h2>
        <p class="hint">Final standings for Room ${s.code}:</p>
        ${players.map((p,i)=>`
          <div class="list-row"><span>${i===0?'🏆 ':''}${escapeHtml(p.name)}</span><strong>${p.score||0} pts</strong></div>
        `).join('')}
        ${IS_HOST ? `<button class="btn btn-primary btn-block" id="newRoomBtn">Start a New Room</button>` : `<button class="btn btn-block" id="leaveBtn2">Leave Room</button>`}
      </div>
    </div>
  `;
  if (IS_HOST){
    document.getElementById('newRoomBtn').onclick = ()=>{ leaveRoom(); };
  } else {
    document.getElementById('leaveBtn2').onclick = leaveRoom;
  }
}

/* ---------- PLAYER SCREEN ---------- */
function renderPlayerScreen(){
  const s = ROOM_STATE;
  if (!s){ mainEl.innerHTML = '<div class="wrap">Loading room…</div>'; return; }
  if (s.status === 'ended'){ renderGameEnded(s); return; }
  if (s.status === 'lobby'){
    mainEl.innerHTML = `
      <div class="wrap" style="max-width:560px;">
        <div class="panel">
          <h2>Waiting for the Host…</h2>
          <p class="hint">You're in room <strong>${s.code}</strong>. Sit tight while the host adds everyone and starts the game.</p>
          <div id="playerListReadonly"></div>
        </div>
      </div>
    `;
    const box = document.getElementById('playerListReadonly');
    const players = Object.values(s.players||{});
    box.innerHTML = players.length ? players.map(p=>`<div class="pill" style="margin:4px;">${escapeHtml(p.name)}</div>`).join('') : '<p class="hint">No one else has joined yet.</p>';
    return;
  }

  const active = currentPlayer(s);
  const isMyTurn = active && active.id === MY_PLAYER_ID;
  let cardAreaHtml = '';

  if (s.activeQuestion){
    cardAreaHtml = renderQuestionPanel(s, false);
  } else if (s.activeCard){
    const era = ERAS[s.activeCard.eraId];
    const card = era.cards.find(c=>c.id===s.activeCard.cardId);
    const usedDiffs = (s.usedDifficulties && s.usedDifficulties[card.id]) || [];
    cardAreaHtml = `
      <div class="panel" data-era="${era.id}">
        <h2 style="color:#fff;">${escapeHtml(card.title)}</h2>
        ${isMyTurn ? `<p class="hint" style="color:rgba(255,255,255,.8);">It's your turn — choose a difficulty!</p>` : `<p class="hint" style="color:rgba(255,255,255,.8);">Waiting for ${escapeHtml(active?active.name:'the active player')} to choose a difficulty…</p>`}
        <div class="diff-select">
          ${DIFFICULTIES.map(d=>`
            <div class="diff-btn ${usedDiffs.includes(d.key)?'used':''} ${isMyTurn && !usedDiffs.includes(d.key)?'':'no-select'}" data-diff="${d.key}" style="${isMyTurn && !usedDiffs.includes(d.key)?'cursor:pointer;':'cursor:default;'}">
              <div class="lvl">${d.label}</div>
              <div class="pts">${d.points} pts</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } else if (s.activeEra){
    cardAreaHtml = `<div class="panel"><h2>${ERAS[s.activeEra].name} — ${isMyTurn?'Choose a Card':'Card Selection'}</h2>${renderCardGrid(s.activeEra, s)}</div>`;
  } else {
    cardAreaHtml = `<div class="panel"><p class="hint">${isMyTurn ? 'Roll the die to reveal your era deck!' : 'Waiting for ' + (active?escapeHtml(active.name):'the active player') + ' to roll…'}</p></div>`;
  }

  mainEl.innerHTML = `
    <div class="wrap">
      ${isMyTurn ? `<div class="turn-banner">🖖 It's your turn!</div><div style="height:12px;"></div>` : ''}
      <div class="panel">
        <h2>Scoreboard</h2>
        ${renderScoreboard(s, {})}
      </div>
      <div class="panel">
        <h2>Dice</h2>
        <div class="dice-zone">
          <div class="die ${s.dice && s.dice.rolling?'rolling':''} ${s.dice && s.dice.result==='wildcard'?'result-wildcard':''}">
            <div class="die-face">${diceFaceLabel(s.dice)}</div>
            <div class="die-label">${active?escapeHtml(active.name)+'\'s roll':'—'}</div>
          </div>
          ${isMyTurn && !s.activeEra && !s.dice.result ? `<button class="btn btn-primary btn-block" id="playerRollBtn">🎲 Roll the Die</button>` : ''}
        </div>
      </div>
      <div class="panel">
        <h2>Era Decks</h2>
        ${renderEraGrid(s, {})}
      </div>
      <div id="cardArea">${cardAreaHtml}</div>
    </div>
  `;

  const rollBtn = document.getElementById('playerRollBtn');
  if (rollBtn) rollBtn.onclick = hostRollDice; // same roll logic; any client with sync write access can trigger it

  if (s.activeCard && !s.activeQuestion && isMyTurn){
    mainEl.querySelectorAll('.diff-btn').forEach(btn=>{
      if (btn.classList.contains('used')) return;
      btn.onclick = ()=>{
        const diff = btn.dataset.diff;
        const points = DIFFICULTIES.find(d=>d.key===diff).points;
        pushUpdate({ activeQuestion: { difficulty:diff, revealed:false, answered:false, points } });
      };
    });
  }
  if (s.activeEra && !s.activeCard && isMyTurn){
    mainEl.querySelectorAll('[data-card-select]').forEach(tile=>{
      if (tile.classList.contains('used')) return;
      tile.onclick = ()=>{
        pushUpdate({ activeCard: { eraId: tile.dataset.era, cardId: tile.dataset.cardSelect } });
      };
    });
  }
  // If wildcard was rolled, let the active player pick their era from the grid
  if (isMyTurn && s.dice && s.dice.result === 'wildcard' && !s.activeEra){
    mainEl.querySelectorAll('.era-grid .era-tile:not([data-era="wildcard"])').forEach(tile=>{
      if (tile.classList.contains('disabled')) return;
      tile.style.cursor='pointer';
      tile.onclick = ()=>{
        pushUpdate({ activeEra: tile.dataset.era, activeCard:null, activeQuestion:null });
      };
    });
  }
}

/* ----------------------------------------------------------------------
   6. BOOTSTRAP + starfield canvas
   ---------------------------------------------------------------------- */
function initStarfield(){
  const canvas = document.getElementById('starfield-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const count = Math.floor((canvas.width*canvas.height)/9000);
    stars = Array.from({length:count}, ()=>({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*1.3+0.2,
      a: Math.random()*0.6+0.2,
      tw: Math.random()*0.02+0.005
    }));
  }
  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
      s.a += s.tw;
      const alpha = 0.4 + Math.sin(s.a)*0.4;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(220,235,255,${Math.max(0,alpha)})`;
      ctx.fill();
    });
    requestAnimationFrame(tick);
  }
  window.addEventListener('resize', resize);
  resize();
  tick();
}

function boot(){
  initStarfield();
  renderLanding();
}
boot();
